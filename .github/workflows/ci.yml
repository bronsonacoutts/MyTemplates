name: CI Checks

on:
  workflow_run:
    workflows:
      - PR Validation
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: ci-checks-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  gate:
    name: Validate Upstream Workflow
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require successful PR validation
        if: github.event_name == 'workflow_run'
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "PR Validation concluded with ${{ github.event.workflow_run.conclusion }}."
            exit 1
          fi

  decide:
    name: Decide Whether Cloud CI Is Needed
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      head_sha: ${{ steps.context.outputs.head_sha }}
      skip_ci: ${{ steps.signal.outputs.skip_ci }}
    steps:
      - name: Select commit to inspect
        id: context
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "head_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.context.outputs.head_sha }}

      - name: Check for a local validation signal
        id: signal
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip_ci=false" >> "$GITHUB_OUTPUT"
          elif node scripts/local-validation-signal.js inspect "lint,format:check,validate:catalog,type-check" "${{ steps.context.outputs.head_sha }}"; then
            echo "skip_ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_ci=false" >> "$GITHUB_OUTPUT"
          fi

  ci-checks:
    name: Run Cloud CI Checks
    needs: decide
    if: needs.decide.outputs.skip_ci != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.decide.outputs.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run CI checks
        run: npm run ci:checks

  ci-result:
    name: CI Checks Result
    if: always()
    needs:
      - gate
      - decide
      - ci-checks
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Finalise CI result
        run: |
          if [ "${{ needs.gate.result }}" != "success" ]; then
            echo "The upstream PR validation workflow failed."
            exit 1
          fi

          if [ "${{ needs.decide.result }}" != "success" ]; then
            echo "The CI gating decision failed."
            exit 1
          fi

          if [ "${{ needs.decide.outputs.skip_ci }}" = "true" ]; then
            echo "Cloud CI checks were skipped because Husky already stamped this commit."
            exit 0
          fi

          if [ "${{ needs.ci-checks.result }}" != "success" ]; then
            echo "Cloud CI checks did not complete successfully."
            exit 1
          fi

          echo "Cloud CI checks passed."
