name: 'Copilot Setup Steps'

# Keep this workflow manual so it does not consume minutes on routine branch or PR activity.
on:
  workflow_dispatch:

jobs:
  # This job MUST be named `copilot-setup-steps` for Copilot to pick it up.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      # Required to check out the repository and read dependencies.
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
