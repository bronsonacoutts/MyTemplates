name: Tests

on:
  workflow_run:
    workflows:
      - CI Checks
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: tests-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  gate:
    name: Validate Upstream Workflow
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require successful CI checks
        if: github.event_name == 'workflow_run'
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "CI Checks concluded with ${{ github.event.workflow_run.conclusion }}."
            exit 1
          fi

  decide:
    name: Decide Whether Cloud Tests Are Needed
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      head_sha: ${{ steps.context.outputs.head_sha }}
      skip_tests: ${{ steps.signal.outputs.skip_tests }}
    steps:
      - name: Select commit to inspect
        id: context
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "head_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.context.outputs.head_sha }}

      - name: Check for a local validation signal
        id: signal
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip_tests=false" >> "$GITHUB_OUTPUT"
          elif node scripts/local-validation-signal.js inspect "test" "${{ steps.context.outputs.head_sha }}"; then
            echo "skip_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_tests=false" >> "$GITHUB_OUTPUT"
          fi

  unit-tests:
    name: Run Cloud Unit Tests
    needs: decide
    if: needs.decide.outputs.skip_tests != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.decide.outputs.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run ci:tests

  tests-result:
    name: Tests Result
    if: always()
    needs:
      - gate
      - decide
      - unit-tests
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Finalise tests result
        run: |
          if [ "${{ needs.gate.result }}" != "success" ]; then
            echo "The upstream CI workflow failed."
            exit 1
          fi

          if [ "${{ needs.decide.result }}" != "success" ]; then
            echo "The test gating decision failed."
            exit 1
          fi

          if [ "${{ needs.decide.outputs.skip_tests }}" = "true" ]; then
            echo "Cloud tests were skipped because Husky already stamped this commit."
            exit 0
          fi

          if [ "${{ needs.unit-tests.result }}" != "success" ]; then
            echo "Cloud tests did not complete successfully."
            exit 1
          fi

          echo "Cloud tests passed."
